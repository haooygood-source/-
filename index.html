<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Bubble Shooter</title>

<style>

body{
margin:0;
background:white;
text-align:center;
font-family:sans-serif;
touch-action:manipulation;
}

canvas{
background:white;
margin-top:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
max-width:95vw;
}

#score{
font-size:20px;
margin:10px;
}

#proposal{
display:none;
margin-top:20px;
position:relative;
}

button{

padding:12px 24px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
transition:all 0.1s;

}

button:active{
transform:scale(0.9);
}

#yes{
background:#ff6fa5;
color:white;
}

#no{
background:#ccc;
position:relative;
}

.heart{
position:fixed;
font-size:26px;
animation:float 3s linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-200px) scale(1.8);
opacity:0;
}
}

</style>
</head>

<body>

<h2>Bubble Shooter</h2>
<div id="score">점수 0 / 1004</div>

<canvas id="game" width="360" height="500"></canvas>

<div id="proposal">
<h2>나랑 사귈래?</h2>

<button id="yes">예</button>
<button id="no">아니오</button>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const size=36
const rows=8
const cols=10

const colors=[
"#ff6fa5",
"#6fc3ff",
"#ffd166",
"#8aff8a"
]

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)]
}

let grid=[]
let shot=null
let score=0

const shooter={
x:180,
y:470,
current:randomColor(),
next:randomColor()
}

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

if(r<4){
grid[r][c]=randomColor()
}else{
grid[r][c]=null
}

}

}

function draw(){

ctx.clearRect(0,0,360,500)

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

const color=grid[r][c]

if(color){

let x=c*size+size/2
let y=r*size+size/2

ctx.beginPath()
ctx.arc(x,y,16,0,Math.PI*2)
ctx.fillStyle=color
ctx.fill()

}

}
}

ctx.beginPath()
ctx.arc(shooter.x,shooter.y,16,0,Math.PI*2)
ctx.fillStyle=shooter.current
ctx.fill()

ctx.beginPath()
ctx.arc(shooter.x+30,shooter.y+5,10,0,Math.PI*2)
ctx.fillStyle=shooter.next
ctx.fill()

if(shot){

ctx.beginPath()
ctx.arc(shot.x,shot.y,16,0,Math.PI*2)
ctx.fillStyle=shot.color
ctx.fill()

}

}

function shoot(e){

if(shot) return

const rect=canvas.getBoundingClientRect()

let tx
let ty

if(e.touches){
tx=e.touches[0].clientX-rect.left
ty=e.touches[0].clientY-rect.top
}else{
tx=e.clientX-rect.left
ty=e.clientY-rect.top
}

let dx=tx-shooter.x
let dy=ty-shooter.y

let len=Math.sqrt(dx*dx+dy*dy)

dx/=len
dy/=len

shot={
x:shooter.x,
y:shooter.y,
dx:dx*6,
dy:dy*6,
color:shooter.current
}

}

canvas.addEventListener("click",shoot)

canvas.addEventListener("touchstart",function(e){
e.preventDefault()
shoot(e)
})

function update(){

if(shot){

shot.x+=shot.dx
shot.y+=shot.dy

if(shot.y<0){
attachBubble()
}

checkCollision()

}

draw()

requestAnimationFrame(update)

}

function checkCollision(){

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

if(grid[r][c]){

let x=c*size+size/2
let y=r*size+size/2

let d=Math.hypot(x-shot.x,y-shot.y)

if(d<32){
attachBubble()
return
}

}

}
}

}

function attachBubble(){

let c=Math.floor(shot.x/size)
let r=Math.floor(shot.y/size)

if(r<0) r=0

grid[r][c]=shot.color

shot=null

checkMatch(r,c)

shooter.current=shooter.next
shooter.next=randomColor()

}

function checkMatch(r,c){

let color=grid[r][c]

let stack=[[r,c]]
let visited={}
let group=[]

while(stack.length){

let [cr,cc]=stack.pop()

let key=cr+"_"+cc

if(visited[key]) continue

visited[key]=true

if(grid[cr] && grid[cr][cc]==color){

group.push([cr,cc])

let dirs=[[1,0],[-1,0],[0,1],[0,-1]]

dirs.forEach(d=>{
stack.push([cr+d[0],cc+d[1]])
})

}

}

if(group.length>=3){

group.forEach(p=>{
grid[p[0]][p[1]]=null
})

score+=group.length*50

if(score>1004) score=1004

document.getElementById("score").innerText="점수 "+score+" / 1004"

}

if(score>=1004){
document.getElementById("proposal").style.display="block"
}

}

update()

const noBtn=document.getElementById("no")

function moveNo(x,y){

const rect=noBtn.getBoundingClientRect()

const dx=x-(rect.left+rect.width/2)
const dy=y-(rect.top+rect.height/2)

const dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

noBtn.style.position="fixed"

noBtn.style.left=Math.random()*(window.innerWidth-100)+"px"
noBtn.style.top=Math.random()*(window.innerHeight-50)+"px"

}

}

document.addEventListener("mousemove",e=>{
moveNo(e.clientX,e.clientY)
})

document.addEventListener("touchstart",e=>{
moveNo(e.touches[0].clientX,e.touches[0].clientY)
})

const yesBtn=document.getElementById("yes")

yesBtn.addEventListener("click",showHearts)
yesBtn.addEventListener("touchstart",showHearts)

function showHearts(){

for(let i=0;i<40;i++){

setTimeout(()=>{

const h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=Math.random()*window.innerWidth+"px"
h.style.top=window.innerHeight+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),3000)

},i*80)

}

}

</script>

</body>
</html>
