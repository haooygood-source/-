<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bubble Shooter</title>

<style>

body{
margin:0;
background:white;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

h2{margin:10px;}

canvas{
background:#f5f5f5;
border-radius:10px;
touch-action:none;
}

#score{
font-size:20px;
margin-bottom:6px;
}

#proposal{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.15);
}

button{
font-size:22px;
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
transition:transform .1s;
}

button:active{transform:scale(.9);}

#yes{
background:#ff5fa2;
color:white;
}

#no{
background:#ccc;
position:absolute;
}

.heart{
position:absolute;
font-size:30px;
animation:float 2s linear forwards;
}

@keyframes float{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-200px)}
}

</style>
</head>

<body>

<h2 id="title">Bubble Shooter</h2>
<div id="score">Score : 0</div>

<canvas id="game"></canvas>

<div id="proposal">
<h1>나랑 사귈래?</h1>
<button id="yes">예</button>
<button id="no">아니오</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let W=Math.min(window.innerWidth,500)
let H=Math.min(window.innerHeight*0.7,650)

canvas.width=W
canvas.height=H

const R=16
const ROWS=10
const COLS=Math.floor(W/(R*2))

const colors=["#ff6b9d","#6bcBff","#ffd93d","#6bff95","#b06bff"]

let grid=[]
let score=0
let shot=null
let gameOver=false

let angle=-Math.PI/2

let currentColor=randomColor()
let nextColor=randomColor()

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)]
}

function init(){

for(let r=0;r<ROWS;r++){

grid[r]=[]

for(let c=0;c<COLS;c++){

if(r<4){
grid[r][c]={color:randomColor()}
}else{
grid[r][c]=null
}

}

}

}

init()

function drawBubble(x,y,color){
ctx.beginPath()
ctx.arc(x,y,R,0,Math.PI*2)
ctx.fillStyle=color
ctx.fill()
}

function draw(){

ctx.clearRect(0,0,W,H)

for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){

let b=grid[r][c]

if(b){

drawBubble(
c*R*2+R,
r*R*2+R,
b.color)

}

}
}

if(shot){
drawBubble(shot.x,shot.y,shot.color)
}

drawBubble(W/2,H-40,currentColor)

drawAim()

}

function drawAim(){

ctx.strokeStyle="rgba(0,0,0,0.4)"
ctx.setLineDash([6,6])

ctx.beginPath()
ctx.moveTo(W/2,H-40)

let lx=W/2+Math.cos(angle)*160
let ly=H-40+Math.sin(angle)*160

ctx.lineTo(lx,ly)
ctx.stroke()

ctx.setLineDash([])

}

function shoot(){

if(shot||gameOver)return

shot={
x:W/2,
y:H-40,
dx:Math.cos(angle)*8,
dy:Math.sin(angle)*8,
color:currentColor
}

currentColor=nextColor
nextColor=randomColor()

}

function update(){

if(gameOver)return

if(shot){

shot.x+=shot.dx
shot.y+=shot.dy

if(shot.x<R||shot.x>W-R){
shot.dx*=-1
}

if(shot.y<R){
attachBubble()
return
}

checkCollision()

}

draw()

requestAnimationFrame(update)

}

function attachBubble(){

let col=Math.floor(shot.x/(R*2))
let row=Math.floor(shot.y/(R*2))

if(row<0)row=0
if(row>=ROWS)row=ROWS-1

grid[row][col]={color:shot.color}

checkMatch(row,col)

shot=null

}

function checkCollision(){

for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){

let b=grid[r][c]
if(!b)continue

let bx=c*R*2+R
let by=r*R*2+R

let dx=shot.x-bx
let dy=shot.y-by

if(Math.sqrt(dx*dx+dy*dy)<R*2){
attachBubble()
return
}

}
}

}

function checkMatch(r,c){

let color=grid[r][c].color
let stack=[[r,c]]
let visited={}
let match=[]

while(stack.length){

let [rr,cc]=stack.pop()
let key=rr+"_"+cc

if(visited[key])continue
visited[key]=true

let b=grid[rr][cc]
if(!b||b.color!=color)continue

match.push([rr,cc])

let dirs=[[1,0],[-1,0],[0,1],[0,-1]]

for(let d of dirs){

let nr=rr+d[0]
let nc=cc+d[1]

if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){
stack.push([nr,nc])
}

}

}

if(match.length>=3){

for(let m of match){
grid[m[0]][m[1]]=null
}

score+=match.length*60

document.getElementById("score").innerText="Score : "+score

if(score>=1004){
endGame()
}

}

}

function endGame(){

gameOver=true

canvas.style.display="none"
document.getElementById("score").style.display="none"
document.getElementById("title").style.display="none"

let proposal=document.getElementById("proposal")
proposal.style.display="block"

initNoButton()

}

canvas.addEventListener("mousemove",e=>{

let rect=canvas.getBoundingClientRect()

let mx=e.clientX-rect.left
let my=e.clientY-rect.top

angle=Math.atan2(my-(H-40),mx-(W/2))

})

canvas.addEventListener("click",shoot)

canvas.addEventListener("touchmove",e=>{

let rect=canvas.getBoundingClientRect()

let mx=e.touches[0].clientX-rect.left
let my=e.touches[0].clientY-rect.top

angle=Math.atan2(my-(H-40),mx-(W/2))

})

canvas.addEventListener("touchstart",shoot)

function heart(){

let h=document.createElement("div")
h.className="heart"
h.innerText="💖"

h.style.left=Math.random()*window.innerWidth+"px"
h.style.top=window.innerHeight+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

document.getElementById("yes").onclick=()=>{
setInterval(heart,200)
}

const no=document.getElementById("no")
const proposal=document.getElementById("proposal")

function initNoButton(){

let maxX=proposal.offsetWidth-no.offsetWidth
let maxY=proposal.offsetHeight-no.offsetHeight

no.style.left=maxX/2+"px"
no.style.top=maxY/2+"px"

}

function moveNo(x,y){

let rect=no.getBoundingClientRect()

let dx=x-(rect.left+rect.width/2)
let dy=y-(rect.top+rect.height/2)

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

let maxX=proposal.offsetWidth-no.offsetWidth
let maxY=proposal.offsetHeight-no.offsetHeight

let nx=Math.random()*maxX
let ny=Math.random()*maxY

no.style.left=nx+"px"
no.style.top=ny+"px"

}

}

document.addEventListener("mousemove",e=>{
moveNo(e.clientX,e.clientY)
})

document.addEventListener("touchmove",e=>{
moveNo(e.touches[0].clientX,e.touches[0].clientY)
})

update()

</script>
</body>
</html>
